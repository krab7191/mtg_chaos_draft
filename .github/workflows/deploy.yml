name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Build containers
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy containers
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}-api:latest
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}-frontend:latest

            docker stop api 2>/dev/null || true
            docker rm api 2>/dev/null || true
            docker run -d --name api --network app --network-alias api \
              --env-file ~/app/.env \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ github.repository }}-api:latest

            docker stop frontend 2>/dev/null || true
            docker rm frontend 2>/dev/null || true
            docker run -d --name frontend --network app --network-alias frontend \
              --env-file ~/app/.env \
              -e API_URL="http://api:8080" \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ github.repository }}-frontend:latest
          '
