repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        always_run: true
      - id: end-of-file-fixer
        always_run: true
      - id: check-yaml
        files: \.(yaml|yml)$
      - id: check-added-large-files
        always_run: true

  - repo: local
    hooks:
      - id: go-mod-tidy
        name: go mod tidy
        entry: bash -c 'cd api && go mod tidy'
        language: system
        always_run: true
        pass_filenames: false
      - id: go-fmt
        name: go fmt
        entry: bash -c 'cd api && go fmt ./...'
        language: system
        always_run: true
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: bash -c 'cd api && go vet ./...'
        language: system
        always_run: true
        pass_filenames: false
      - id: staticcheck
        name: staticcheck
        entry: bash -c 'cd api && $HOME/go/bin/staticcheck ./...'
        language: system
        always_run: true
        pass_filenames: false
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'cd api && $HOME/go/bin/golangci-lint run ./...'
        language: system
        always_run: true
        pass_filenames: false
      - id: govulncheck
        name: govulncheck
        entry: bash -c 'cd api && $HOME/go/bin/govulncheck ./...'
        language: system
        always_run: true
        pass_filenames: false

  - repo: local
    hooks:
      - id: astro-check
        name: astro check
        entry: bash -c 'cd frontend && npm run check'
        language: system
        always_run: true
        pass_filenames: false
      - id: npm-audit
        name: npm audit
        entry: bash -c 'cd frontend && npm audit --audit-level=high'
        language: system
        always_run: true
        pass_filenames: false
