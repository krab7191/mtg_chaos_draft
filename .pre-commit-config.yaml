repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: bash -c 'cd api && go fmt ./...'
        language: system
        files: ^api/.*\.go$
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: bash -c 'cd api && go vet ./...'
        language: system
        files: ^api/.*\.go$
        pass_filenames: false

  - repo: local
    hooks:
      - id: astro-check
        name: astro check
        entry: bash -c 'cd frontend && npm run check'
        language: system
        files: ^frontend/.*\.(js|ts|astro)$
        pass_filenames: false
