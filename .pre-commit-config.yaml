repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: bash -c 'cd api && go fmt ./...'
        language: system
        files: ^api/.*\.go$
        pass_filenames: false
      - id: go-vet
        name: go vet
        entry: bash -c 'cd api && go vet ./...'
        language: system
        files: ^api/.*\.go$
        pass_filenames: false
      - id: staticcheck
        name: staticcheck
        entry: bash -c 'cd api && $HOME/go/bin/staticcheck ./...'
        language: system
        files: ^api/.*\.go$
        pass_filenames: false
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'cd api && $HOME/go/bin/golangci-lint run ./...'
        language: system
        files: ^api/.*\.go$
        pass_filenames: false
      - id: govulncheck
        name: govulncheck
        entry: bash -c 'cd api && $HOME/go/bin/govulncheck ./...'
        language: system
        files: ^api/.*\.go$
        pass_filenames: false

  - repo: local
    hooks:
      - id: astro-check
        name: astro check
        entry: bash -c 'cd frontend && npm run check'
        language: system
        files: ^frontend/.*\.(js|ts|astro)$
        pass_filenames: false
      - id: astro-build
        name: astro build
        entry: bash -c 'cd frontend && npm run build'
        language: system
        files: ^frontend/.*\.(js|ts|astro|scss|css)$
        pass_filenames: false
      - id: npm-audit
        name: npm audit
        entry: bash -c 'cd frontend && npm audit --audit-level=high'
        language: system
        files: ^frontend/package.*\.json$
        pass_filenames: false
