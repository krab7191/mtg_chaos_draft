services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mtg_chaos_draft
      POSTGRES_USER: mtg
      POSTGRES_PASSWORD: mtg
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtg -d mtg_chaos_draft"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ${API_IMAGE:-ghcr.io/krab7191/mtg_chaos_draft-api:latest}
    build: ./api
    environment:
      DATABASE_URL: postgres://mtg:mtg@postgres:5432/mtg_chaos_draft
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost/api/auth/callback}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      VIEWER_EMAILS: ${VIEWER_EMAILS:-}
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/krab7191/mtg_chaos_draft-frontend:latest}
    build: ./frontend
    environment:
      API_URL: http://api:8080
      HOST: "0.0.0.0"
      PORT: "4321"
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - frontend
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
